<!DOCTYPE html>
<!--
  2001 JEFFERSON ST PADUCAH KY — Hyper Agent video-hero template (sanitized).
  Saved as a permanent zillow-clone skill reference. Runtime scripts stripped:
    - geolocation spoofer (was lines 2-10)
    - ha-img-placeholder CSS (was around line 757)
    - postMessage handler (was around line 1096)
    - broken-img-handler (was around line 1103)

  Distinctive layout moves worth keeping:
    - Full-bleed video hero (autoplay-muted-then-tap-to-listen)
      JS pattern: tryAutoplayMuted() on loadedmetadata, enableSound() on cue/hero click
      and first touchstart, separate mute toggle.
    - "Tap for sound" cue (top-right pill) that fades on .hero.sound-on
    - Circular mute toggle (bottom-right) toggles ♪ ↔ 🔊
    - 6-stat hairline strip (Bedrooms / Bathrooms / Sq Ft / Acres / Year / Garage)
    - Centered narrative section with eyebrow + Italiana h2 + Cormorant body + signoff
    - **Alternating feature pull strips** — image-left then text-left, each with:
        eyebrow + Italiana h3 + Cormorant para + 6 gold-dashed bullets in 2-col grid
        Mobile collapse: image-on-top via .feature-strip--text-first .feature-strip-img { order:-1 }
    - Dark-ink pull quote section
    - 3-col masonry gallery + lightbox (prev/next/swipe/keyboard/escape)
    - 2-col details table (Property / Character & Features OR Recent Updates)
    - Location grid with Google Maps iframe
    - Dark-ink inquiry section with working contact form
    - Topbar shrink-on-scroll JS (breakpoint-aware — never use the buggy 116 version)

  Typography: Italiana (display) / Cormorant Garamond (serif body) / Inter (sans).
  Palette: paper #f5f1ea / ink #1f1d1a / gold #a07f3f.

  This file is a READ-ONLY reference. Pair its layout/JS with the Hyper Agent
  reference (321-n-8th-hyper-agent-reference.html) for typographic / palette
  alternatives. The locked-in default zillow-clone format combines both —
  see ../examples/.. comments and SKILL.md "Reference templates" section.
-->
<html lang="en">
							<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2001 Jefferson Street — Paducah, KY</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&amp;family=Inter:wght@300;400;500;600;700&amp;family=Italiana&amp;display=swap" rel="stylesheet">
<style>
  :root {
    --ink:        #1f1d1a;
    --ink-soft:   #45403a;
    --ink-muted:  #7a7268;
    --paper:      #f5f1ea;
    --paper-soft: #ede7dc;
    --rule:       #d9d0c0;
    --moss:       #6c7a5c;
    --moss-deep:  #4a5840;
    --gold:       #a07f3f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    background: var(--paper);
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .serif { font-family: 'Cormorant Garamond', serif; font-weight: 400; }
  .display { font-family: 'Italiana', serif; letter-spacing: 0.02em; }

  /* ============================ TOP BAR ============================ */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 48px;
    background: rgba(245, 241, 234, 0.82);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(217, 208, 192, 0.5);
    transition: padding 0.3s ease;
  }
  .topbar .brand {
    font-family: 'Italiana', serif;
    font-size: 19px;
    letter-spacing: 0.18em;
    color: var(--ink);
  }
  .topbar nav {
    display: flex; gap: 32px;
  }
  .topbar nav a {
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-decoration: none;
    transition: color 0.2s;
  }
  .topbar nav a:hover { color: var(--gold); }
  .topbar .cta {
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 10px 22px;
    border: 1px solid var(--ink);
    color: var(--ink);
    text-decoration: none;
    transition: background 0.2s, color 0.2s;
  }
  .topbar .cta:hover { background: var(--ink); color: var(--paper); }
  @media (max-width: 768px) {
    .topbar { padding: 14px 22px; }
    .topbar nav { display: none; }
  }

  /* ============================ HERO ============================ */
  .hero {
    position: relative;
    height: 100vh;
    min-height: 600px;
    width: 100%;
    overflow: hidden;
    background: #1a1a1a;
  }
  .hero video, .hero-poster {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  .hero-poster {
    z-index: 1;
    transition: opacity 0.6s ease;
  }
  .hero.playing .hero-poster { opacity: 0; pointer-events: none; }
  /* Hero video starts visible (autoplay muted), poster is just a fallback for slow-load */
  .hero::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(0,0,0,0.32) 0%,
      rgba(0,0,0,0.10) 38%,
      rgba(0,0,0,0.20) 70%,
      rgba(0,0,0,0.55) 100%);
    pointer-events: none;
    z-index: 2;
  }

  /* "Tap to listen" badge — subtle, pulsing, only visible until sound is on */
  .sound-cue {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 4;
    display: flex; align-items: center; gap: 10px;
    padding: 14px 22px 14px 18px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.32);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.6s ease, transform 0.6s ease;
    pointer-events: auto;
    user-select: none;
  }
  .sound-cue::before {
    content: '';
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #fff;
    animation: sound-pulse 1.6s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes sound-pulse {
    0%, 100% { transform: scale(1);   box-shadow: 0 0 0 0 rgba(255,255,255,0.5); }
    50%      { transform: scale(0.85); box-shadow: 0 0 0 10px rgba(255,255,255,0); }
  }
  .hero.sound-on .sound-cue {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.92);
    pointer-events: none;
  }
  @media (max-width: 768px) {
    .sound-cue { font-size: 10.5px; padding: 12px 18px 12px 14px; gap: 8px; }
    .sound-cue::before { width: 8px; height: 8px; }
  }
  .hero-content {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 0 64px 56px;
    color: #fff;
    z-index: 2;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 48px;
  }
  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.78);
    margin-bottom: 18px;
    display: flex; align-items: center; gap: 14px;
  }
  .hero-eyebrow::after {
    content: '';
    flex: 0 0 60px;
    height: 1px;
    background: rgba(255,255,255,0.5);
  }
  .hero-address {
    font-family: 'Italiana', serif;
    font-size: clamp(48px, 7vw, 96px);
    line-height: 0.96;
    color: #fff;
    margin-bottom: 14px;
    letter-spacing: 0.005em;
  }
  .hero-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(18px, 1.6vw, 22px);
    color: rgba(255, 255, 255, 0.88);
    font-weight: 400;
  }
  .hero-stats {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.85);
  }
  .hero-price {
    font-family: 'Italiana', serif;
    font-size: clamp(32px, 3.8vw, 52px);
    color: #fff;
    letter-spacing: 0.01em;
    text-transform: none;
    line-height: 1;
    margin-bottom: 6px;
  }
  .hero-mute {
    position: absolute;
    bottom: 56px; right: 64px;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.16);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #fff;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    z-index: 5;
    display: flex;
    align-items: center; justify-content: center;
    font-size: 14px;
    transition: background 0.2s;
  }
  .hero-mute:hover { background: rgba(255,255,255,0.28); }
  .scroll-cue {
    position: absolute;
    top: 50%; left: 32px;
    transform: rotate(-90deg) translateX(50%);
    transform-origin: left center;
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    z-index: 2;
  }
  @media (max-width: 768px) {
    .hero-content { padding: 0 24px 36px; grid-template-columns: 1fr; gap: 24px; }
    .hero-stats { align-items: flex-start; }
    .hero-mute { bottom: 24px; right: 24px; }
    .scroll-cue { display: none; }
  }

  /* ============================ HIGHLIGHTS STRIP ============================ */
  .highlights {
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    padding: 42px 48px;
  }
  .highlights-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 24px;
  }
  .stat {
    text-align: center;
    border-right: 1px solid var(--rule);
    padding: 6px 12px;
  }
  .stat:last-child { border-right: none; }
  .stat-num {
    font-family: 'Italiana', serif;
    font-size: 38px;
    line-height: 1;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .stat-label {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  @media (max-width: 900px) {
    .highlights { padding: 32px 24px; }
    .highlights-inner { grid-template-columns: repeat(3, 1fr); gap: 28px 12px; }
    .stat { border-right: none; }
    .stat:nth-child(3n) { border-right: none; }
    .stat-num { font-size: 30px; }
  }

  /* ============================ NARRATIVE ============================ */
  .narrative {
    padding: 140px 48px;
    background: var(--paper);
  }
  .narrative-inner {
    max-width: 880px;
    margin: 0 auto;
    text-align: center;
  }
  .section-eyebrow {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 28px;
    display: inline-flex;
    align-items: center;
    gap: 14px;
  }
  .section-eyebrow::before, .section-eyebrow::after {
    content: '';
    width: 30px; height: 1px;
    background: var(--gold);
    opacity: 0.6;
  }
  .narrative h2 {
    font-family: 'Italiana', serif;
    font-size: clamp(40px, 5.4vw, 72px);
    line-height: 1.04;
    color: var(--ink);
    margin-bottom: 36px;
    letter-spacing: 0.005em;
  }
  .narrative-lede {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 2.1vw, 28px);
    line-height: 1.5;
    color: var(--ink-soft);
    font-style: italic;
    font-weight: 400;
    margin-bottom: 48px;
  }
  .narrative p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 21px;
    line-height: 1.65;
    color: var(--ink-soft);
    margin-bottom: 22px;
    text-align: left;
  }
  .narrative .signoff {
    text-align: center;
    margin-top: 48px;
    font-family: 'Italiana', serif;
    font-size: 18px;
    color: var(--ink);
    letter-spacing: 0.18em;
  }
  @media (max-width: 768px) {
    .narrative { padding: 80px 24px; }
  }

  /* ============================ FEATURE PULL ============================ */
  .feature-strip {
    background: var(--paper-soft);
    padding: 0;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
  }
  .feature-strip-inner {
    display: grid;
    grid-template-columns: 1.2fr 1fr;
    align-items: stretch;
    max-width: 1440px;
    margin: 0 auto;
  }
  .feature-img {
    background-size: cover;
    background-position: center;
    min-height: 560px;
  }
  .feature-text {
    padding: 90px 64px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .feature-text h3 {
    font-family: 'Italiana', serif;
    font-size: clamp(36px, 4.2vw, 56px);
    line-height: 1.06;
    margin-bottom: 28px;
    color: var(--ink);
  }
  .feature-text p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 21px;
    line-height: 1.65;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }
  .feature-list {
    list-style: none;
    margin-top: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 28px;
  }
  .feature-list li {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    padding-left: 22px;
    position: relative;
  }
  .feature-list li::before {
    content: '';
    position: absolute;
    left: 0; top: 9px;
    width: 12px; height: 1px;
    background: var(--gold);
  }
  @media (max-width: 900px) {
    .feature-strip-inner { grid-template-columns: 1fr; }
    .feature-img { min-height: 360px; }
    .feature-text { padding: 56px 28px; }
    .feature-list { grid-template-columns: 1fr; }
  }

  /* ============================ GALLERY ============================ */
  .gallery-section {
    padding: 120px 48px;
    background: var(--paper);
  }
  .gallery-header {
    text-align: center;
    margin-bottom: 64px;
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
  }
  .gallery-header h2 {
    font-family: 'Italiana', serif;
    font-size: clamp(36px, 5vw, 60px);
    line-height: 1.06;
    margin-bottom: 16px;
    color: var(--ink);
  }
  .gallery-header p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 19px;
    color: var(--ink-muted);
  }
  .masonry {
    columns: 3;
    column-gap: 18px;
    max-width: 1480px;
    margin: 0 auto;
  }
  .masonry-item {
    break-inside: avoid;
    margin-bottom: 18px;
    overflow: hidden;
    cursor: pointer;
    background: var(--paper-soft);
  }
  .masonry-item img {
    width: 100%;
    display: block;
    transition: transform 0.7s ease;
  }
  .masonry-item:hover img { transform: scale(1.04); }
  @media (max-width: 1024px) { .masonry { columns: 2; } }
  @media (max-width: 600px) { .masonry { columns: 1; } .gallery-section { padding: 80px 20px; } }

  /* ============================ PULL QUOTE ============================ */
  .pullquote {
    background: var(--ink);
    color: var(--paper);
    padding: 140px 48px;
    text-align: center;
  }
  .pullquote-inner { max-width: 980px; margin: 0 auto; }
  .pullquote-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(28px, 3.6vw, 48px);
    line-height: 1.32;
    color: var(--paper);
    margin-bottom: 36px;
  }
  .pullquote-text::before, .pullquote-text::after {
    content: '"';
    color: var(--gold);
    font-family: 'Italiana', serif;
    font-style: normal;
    font-size: 1.2em;
    line-height: 0;
    vertical-align: middle;
    padding: 0 0.1em;
  }
  .pullquote-attr {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(245, 241, 234, 0.6);
  }
  @media (max-width: 768px) { .pullquote { padding: 80px 24px; } }

  /* ============================ DETAILS ============================ */
  .details {
    padding: 120px 48px;
    background: var(--paper);
  }
  .details-inner {
    max-width: 1180px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
  }
  .details-col h3 {
    font-family: 'Italiana', serif;
    font-size: 32px;
    margin-bottom: 28px;
    color: var(--ink);
    padding-bottom: 14px;
    border-bottom: 1px solid var(--rule);
  }
  .details-row {
    display: flex; justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--rule);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
  }
  .details-row span:first-child {
    color: var(--ink-muted);
    letter-spacing: 0.04em;
  }
  .details-row span:last-child {
    color: var(--ink);
    font-weight: 500;
    text-align: right;
  }
  @media (max-width: 768px) {
    .details-inner { grid-template-columns: 1fr; gap: 48px; }
    .details { padding: 80px 24px; }
  }

  /* ============================ LOCATION ============================ */
  .location {
    background: var(--paper-soft);
    padding: 120px 48px;
    border-top: 1px solid var(--rule);
  }
  .location-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1.1fr;
    gap: 64px;
    align-items: center;
  }
  .location-text h2 {
    font-family: 'Italiana', serif;
    font-size: clamp(36px, 4.6vw, 56px);
    line-height: 1.06;
    margin-bottom: 28px;
    color: var(--ink);
  }
  .location-text p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    line-height: 1.65;
    color: var(--ink-soft);
    margin-bottom: 18px;
  }
  .location-list {
    list-style: none;
    margin-top: 36px;
    border-top: 1px solid var(--rule);
  }
  .location-list li {
    display: flex;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--rule);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    letter-spacing: 0.02em;
  }
  .location-list li span:last-child {
    color: var(--ink-muted);
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
  }
  .map-wrap {
    aspect-ratio: 4 / 5;
    background: #ddd;
    overflow: hidden;
    border: 1px solid var(--rule);
  }
  .map-wrap iframe {
    width: 100%; height: 100%; border: 0;
    filter: saturate(0.85) contrast(0.95);
  }
  @media (max-width: 900px) {
    .location-inner { grid-template-columns: 1fr; gap: 40px; }
    .map-wrap { aspect-ratio: 4 / 3; }
    .location { padding: 80px 24px; }
  }

  /* ============================ INQUIRY / AGENT ============================ */
  .inquiry {
    padding: 120px 48px;
    background: var(--ink);
    color: var(--paper);
  }
  .inquiry-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }
  .agent-card h2 {
    font-family: 'Italiana', serif;
    font-size: clamp(32px, 4vw, 48px);
    line-height: 1.08;
    margin-bottom: 24px;
    color: var(--paper);
  }
  .agent-card p {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    line-height: 1.65;
    color: rgba(245, 241, 234, 0.78);
    margin-bottom: 28px;
  }
  .agent-name {
    font-family: 'Italiana', serif;
    font-size: 24px;
    color: var(--paper);
    margin-bottom: 4px;
  }
  .agent-firm {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 20px;
  }
  .agent-meta {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: rgba(245, 241, 234, 0.6);
    letter-spacing: 0.04em;
  }
  .form-card {
    background: rgba(245, 241, 234, 0.04);
    border: 1px solid rgba(245, 241, 234, 0.14);
    padding: 44px 36px;
  }
  .form-card label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(245, 241, 234, 0.65);
    margin: 0 0 8px;
  }
  .form-card input, .form-card textarea {
    width: 100%;
    background: transparent;
    border: 0;
    border-bottom: 1px solid rgba(245, 241, 234, 0.2);
    padding: 10px 0 14px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--paper);
    margin-bottom: 24px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-card input:focus, .form-card textarea:focus {
    border-color: var(--gold);
  }
  .form-card textarea { resize: vertical; min-height: 80px; }
  .form-card button {
    width: 100%;
    margin-top: 12px;
    padding: 16px 28px;
    background: var(--paper);
    color: var(--ink);
    border: 0;
    font-family: 'Inter', sans-serif;
    font-size: 12px;

<script>
  // ============== Hero video: autoplay muted, unmute on first user gesture ==============
  // Browser rule: muted autoplay works everywhere; audio requires a user gesture (one tap).
  // Strategy: video plays silently as soon as the page loads, then ANY tap/scroll/touch
  // anywhere on the page enables sound. The "Tap for sound" badge tells them what's happening.
  const hero    = document.getElementById('hero');
  const vid     = document.getElementById('heroVid');
  const cue     = document.getElementById('soundCue');
  const muteBtn = document.getElementById('muteToggle');

  // Aggressively start muted playback as soon as we have any data
  function tryAutoplayMuted() {
    vid.muted = true;
    const p = vid.play();
    if (p && typeof p.catch === 'function') {
      p.catch(() => { /* extremely strict webview — will auto-recover on first gesture */ });
    }
  }
  vid.addEventListener('loadedmetadata', tryAutoplayMuted, { once: true });
  vid.addEventListener('canplay',         tryAutoplayMuted, { once: true });
  // Some webviews need a kick on visibility change
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && vid.paused) tryAutoplayMuted();
  });
  // Hide poster as soon as video is moving
  vid.addEventListener('playing', () => { hero.classList.add('playing'); muteBtn.style.display = 'flex'; });

  // First user gesture anywhere → enable sound + start narration
  let soundEnabled = false;
  function enableSound() {
    if (soundEnabled) return;
    soundEnabled = true;
    vid.muted = false;
    // If autoplay was blocked, this gesture-driven play() will succeed
    const p = vid.play();
    if (p && typeof p.catch === 'function') {
      p.catch(() => { /* worst case: stays muted, mute btn still works */ });
    }
    hero.classList.add('sound-on');
    muteBtn.textContent = '♫';
  }
  // Listen for any gesture: tap on the cue, tap anywhere on the hero, tap anywhere on the page,
  // or even the first scroll. The first event wins.
  cue.addEventListener('click',       (e) => { e.stopPropagation(); enableSound(); });
  hero.addEventListener('click',      enableSound);
  document.addEventListener('touchstart', enableSound, { once: true, passive: true });
  document.addEventListener('click',      enableSound, { once: true });
  window.addEventListener('scroll',       enableSound, { once: true, passive: true });
  document.addEventListener('keydown',    enableSound, { once: true });

  // Persistent mute / unmute toggle
  muteBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    vid.muted = !vid.muted;
    muteBtn.textContent = vid.muted ? '♪' : '♫';
    if (!vid.muted) hero.classList.add('sound-on');
    else            hero.classList.remove('sound-on');
  });

  // Lightbox
  const lb = document.getElementById('lb');
  const lbImg = document.getElementById('lbImg');
  const lbClose = document.getElementById('lbClose');
  document.querySelectorAll('.masonry-item img').forEach(img => {
    img.addEventListener('click', () => {
      lbImg.src = img.src;
      lb.classList.add('open');
    });
  });
  lb.addEventListener('click', () => lb.classList.remove('open'));
  lbClose.addEventListener('click', e => { e.stopPropagation(); lb.classList.remove('open'); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') lb.classList.remove('open'); });

  // Subtle topbar shrink on scroll
  let last = 0;
  const tb = document.querySelector('.topbar');
  window.addEventListener('scroll', () => {
    const y = window.scrollY;
    if (y > 80) tb.style.padding = '12px 48px';
    else tb.style.padding = '18px 48px';
  });
</script>
